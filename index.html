```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Circus Shooter</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    background:#000;
    touch-action:none;
    font-family:Arial,sans-serif;
}
canvas{
    display:block;
}
#ui{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-size:28px;
    font-weight:bold;
    text-shadow:2px 2px 5px black;
}
</style>
</head>
<body>

<div id="ui">Очки: <span id="score">0</span></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const player = {
    x: 100,
    y: canvas.height / 2,
    w: 90,
    h: 130
};

const enemy = {
    x: canvas.width - 220,
    y: canvas.height / 2,
    w: 90,
    h: 150,
    speed: 3
};

let bullets = [];
let score = 0;

function updateScore(){
    document.getElementById("score").textContent = score;
}

window.addEventListener("mousemove", e=>{
    player.y = e.clientY;
});

window.addEventListener("touchmove", e=>{
    player.y = e.touches[0].clientY;
    e.preventDefault();
});

window.addEventListener("click", shoot);
window.addEventListener("touchstart", e=>{
    shoot();
    e.preventDefault();
});

function shoot(){
    bullets.push({
        x: player.x + 70,
        y: player.y,
        r: 10
    });
}

function drawBackground(){

    let g = ctx.createLinearGradient(
        0,
        0,
        0,
        canvas.height
    );

    g.addColorStop(0,"#ff66cc");
    g.addColorStop(1,"#6633ff");

    ctx.fillStyle = g;
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for(let i=0;i<15;i++){
        ctx.fillStyle =
            "rgba(255,255,255,0.08)";

        ctx.beginPath();
        ctx.arc(
            (i*170 + performance.now()*0.03)
            % (canvas.width+200),
            (i*120)%canvas.height,
            50,
            0,
            Math.PI*2
        );
        ctx.fill();
    }
}

function drawPlayer(){

    ctx.save();
    ctx.translate(player.x, player.y);

    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(0,-30,35,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#ff0000";
    ctx.fillRect(-35,0,35,60);

    ctx.fillStyle = "#0000ff";
    ctx.fillRect(0,0,35,60);

    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.arc(-10,-35,5,0,Math.PI*2);
    ctx.arc(10,-35,5,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = "#000";
    ctx.beginPath();
    ctx.arc(0,-20,10,0,Math.PI);
    ctx.stroke();

    ctx.restore();
}

function drawEnemy(){

    ctx.save();
    ctx.translate(enemy.x, enemy.y);

    ctx.fillStyle = "#7a38ff";
    ctx.fillRect(-25,-20,50,80);

    ctx.fillRect(-35,-80,20,55);
    ctx.fillRect(15,-80,20,55);

    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(-10,-5,5,0,Math.PI*2);
    ctx.arc(10,-5,5,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
}

function drawBullets(){

    ctx.fillStyle = "yellow";

    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.arc(
            b.x,
            b.y,
            b.r,
            0,
            Math.PI*2
        );
        ctx.fill();
    });
}

function hit(a,b){

    return (
        a.x + a.r > b.x - b.w/2 &&
        a.x - a.r < b.x + b.w/2 &&
        a.y + a.r > b.y - 80 &&
        a.y - a.r < b.y + 60
    );
}

function update(){

    enemy.x -= enemy.speed;

    bullets.forEach((b,i)=>{
        b.x += 12;

        if(hit(b,enemy)){
            bullets.splice(i,1);

            score++;
            updateScore();

            enemy.x =
                canvas.width + 100;

            enemy.y =
                100 +
                Math.random() *
                (canvas.height - 200);

            enemy.speed += 0.2;
        }
    });

    if(enemy.x < -100){

        score = 0;
        updateScore();

        enemy.x =
            canvas.width + 100;

        enemy.speed = 3;
    }
}

function render(){

    drawBackground();
    drawPlayer();
    drawEnemy();
    drawBullets();
}

function loop(){

    update();
    render();

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
