<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Цифровой цирк · Помни против Джекса</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0a12;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            padding: 12px;
            margin: 0;
            touch-action: none;
        }

        .game-wrapper {
            background: linear-gradient(145deg, #1a1040, #0d0a2a);
            padding: 20px 20px 25px;
            border-radius: 32px;
            box-shadow: 0 12px 0 #05051a, 0 0 0 3px #4a3f8a, inset 0 0 40px rgba(100, 80, 200, 0.15);
            max-width: 560px;
            width: 100%;
            border: 1px solid #6a5acd;
        }

        .game-container {
            background: linear-gradient(180deg, #1a1040, #0d0a2a);
            border-radius: 20px;
            padding: 16px;
            box-shadow: inset 0 0 0 2px #3a2f7a;
        }

        /* === ХЕДЕР === */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px 14px 4px;
            color: #c8b8ff;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(100, 80, 255, 0.3);
            flex-wrap: wrap;
            gap: 8px;
        }

        .header-title {
            font-size: 18px;
            background: linear-gradient(90deg, #ff6b9d, #c084fc, #6b9dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            font-weight: 900;
        }

        .score-box {
            background: rgba(20, 15, 50, 0.8);
            padding: 6px 18px;
            border-radius: 40px;
            border: 2px solid #6a5acd;
            color: #f5e97b;
            font-size: 22px;
            box-shadow: inset 0 -3px 0 #2a1f5a, 0 0 20px rgba(100, 80, 255, 0.15);
            backdrop-filter: blur(4px);
        }

        .restart-btn {
            background: linear-gradient(145deg, #3a2f7a, #2a1f5a);
            border: none;
            color: #d3defa;
            font-size: 20px;
            padding: 4px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #15102a, 0 0 20px rgba(100, 80, 255, 0.1);
            transition: 0.07s ease;
            font-family: 'Courier New', monospace;
            border: 2px solid #6a5acd;
        }

        .restart-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #15102a;
        }

        /* === ХОЛСТ === */
        canvas {
            display: block;
            width: 100%;
            aspect-ratio: 480 / 480;
            background: radial-gradient(ellipse at center, #1a1050, #0a0820);
            border-radius: 16px;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            border: 3px solid #4a3f8a;
            box-shadow: inset 0 0 0 2px #15102a, 0 6px 0 #05051a, 0 0 60px rgba(100, 80, 255, 0.08);
            touch-action: none;
            cursor: crosshair;
        }

        /* === ИНФО === */
        .controls-hint {
            display: flex;
            justify-content: space-between;
            padding: 14px 4px 0 4px;
            color: #8a7ab5;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .controls-hint span {
            background: rgba(20, 15, 50, 0.6);
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid #3a2f7a;
            backdrop-filter: blur(4px);
        }

        .hp-bar {
            color: #ff7a8b;
        }

        .enemy-count {
            color: #c084fc;
        }

        @media (max-width: 480px) {
            .game-wrapper {
                padding: 12px;
            }
            .header {
                font-size: 14px;
            }
            .header-title {
                font-size: 15px;
            }
            .score-box {
                font-size: 18px;
                padding: 4px 14px;
            }
            .restart-btn {
                font-size: 16px;
                padding: 2px 14px;
            }
            .controls-hint {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="game-container">
        <!-- ХЕДЕР -->
        <div class="header">
            <span class="header-title">🎪 ЦИФРОВОЙ ЦИРК</span>
            <span class="score-box">⭐ <span id="scoreDisplay">0</span></span>
            <button class="restart-btn" id="restartBtn">↺</button>
        </div>

        <!-- ХОЛСТ 480x480 -->
        <canvas id="gameCanvas" width="480" height="480"></canvas>

        <!-- ПОДСКАЗКИ -->
        <div class="controls-hint">
            <span>🖱️ клик / тап</span>
            <span class="hp-bar">❤️ <span id="hpDisplay">5</span></span>
            <span class="enemy-count">👾 <span id="enemyCount">0</span></span>
        </div>
    </div>
</div>

<script>
    // ============================================================
    //  УДИВИТЕЛЬНЫЙ ЦИФРОВОЙ ЦИРК
    //  Помни против Джекса · Пиксельная стрелялка
    // ============================================================

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // --- UI ---
    const scoreSpan = document.getElementById('scoreDisplay');
    const hpSpan = document.getElementById('hpDisplay');
    const enemyCountSpan = document.getElementById('enemyCount');

    // --- РАЗМЕРЫ ---
    const SIZE = 480;
    const CELL = 24;
    const COLS = 20;
    const ROWS = 20;

    // --- ИГРОВЫЕ ПЕРЕМЕННЫЕ ---
    let score = 0;
    let hp = 5;
    let gameOver = false;
    let frame = 0;

    // --- ИГРОК (ПОМНИ) ---
    const player = {
        x: 10,
        y: 18,
        size: 1.2,
        color: '#ffd93d'
    };

    // --- ВРАГИ (ДЖЕКСЫ) ---
    let enemies = [];

    // --- ПУЛИ ---
    let bullets = [];

    // --- ТАЙМЕР СПАВНА ---
    let spawnCounter = 0;
    const SPAWN_DELAY = 20;

    // --- УПРАВЛЕНИЕ ---
    let targetX = player.x;
    let targetY = player.y;

    // ============================================================
    //  РЕСТАРТ
    // ============================================================
    function resetGame() {
        score = 0;
        hp = 5;
        gameOver = false;
        enemies = [];
        bullets = [];
        spawnCounter = 0;
        player.x = 10;
        player.y = 18;
        targetX = player.x;
        targetY = player.y;
        frame = 0;
        updateUI();
    }

    // ============================================================
    //  СПАВН ДЖЕКСА
    // ============================================================
    function spawnEnemy() {
        if (gameOver) return;
        const side = Math.random() < 0.5 ? 0 : 1;
        let x, y;
        if (side === 0) {
            x = 0.5;
            y = Math.floor(Math.random() * (ROWS - 4)) + 2;
        } else {
            x = COLS - 0.5;
            y = Math.floor(Math.random() * (ROWS - 4)) + 2;
        }

        // Разные типы врагов
        const types = ['jax', 'jax', 'jax', 'jax', 'caine'];
        const type = types[Math.floor(Math.random() * types.length)];

        enemies.push({
            x: x,
            y: y,
            type: type,
            hp: type === 'caine' ? 3 : 1,
            color: type === 'caine' ? '#ff6b6b' : '#b084f0',
            size: type === 'caine' ? 1.8 : 1.2,
            moveTimer: 0,
            animFrame: 0
        });
    }

    // ============================================================
    //  ВЫСТРЕЛ
    // ============================================================
    function shootAt(targetX, targetY) {
        if (gameOver) return;
        const dx = targetX - player.x;
        const dy = targetY - player.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 0.1) return;

        const speed = 7;
        const vx = (dx / dist) * speed;
        const vy = (dy / dist) * speed;

        bullets.push({
            x: player.x + 0.5,
            y: player.y + 0.5,
            vx: vx,
            vy: vy,
            life: 50,
            color: '#ffd93d'
        });
    }

    // ============================================================
    //  UI
    // ============================================================
    function updateUI() {
        scoreSpan.textContent = score;
        hpSpan.textContent = hp;
        enemyCountSpan.textContent = enemies.length;
    }

    // ============================================================
    //  ОБНОВЛЕНИЕ
    // ============================================================
    function update() {
        if (gameOver) return;
        frame++;

        // --- Движение игрока ---
        const dx = targetX - player.x;
        const dy = targetY - player.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0.2) {
            const step = 0.1;
            player.x += (dx / dist) * step;
            player.y += (dy / dist) * step;
        }
        player.x = Math.max(0.3, Math.min(COLS - 0.7, player.x));
        player.y = Math.max(0.3, Math.min(ROWS - 0.7, player.y));

        // --- Спавн ---
        spawnCounter++;
        if (spawnCounter >= SPAWN_DELAY) {
            spawnCounter = 0;
            if (enemies.length < 15) {
                spawnEnemy();
            }
        }

        // --- Движение врагов ---
        for (let e of enemies) {
            const dx2 = player.x - e.x;
            const dy2 = player.y - e.y;
            const d = Math.sqrt(dx2 * dx2 + dy2 * dy2);
            const speed = e.type === 'caine' ? 0.035 : 0.05;
            if (d > 0.3) {
                e.x += (dx2 / d) * speed;
                e.y += (dy2 / d) * speed;
            }
            e.x = Math.max(0.2, Math.min(COLS - 0.2, e.x));
            e.y = Math.max(0.2, Math.min(ROWS - 0.2, e.y));
            e.animFrame += 0.05;
        }

        // --- Пули ---
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.x += b.vx * 0.08;
            b.y += b.vy * 0.08;
            b.life--;

            let bulletUsed = false;
            for (let j = enemies.length - 1; j >= 0; j--) {
                const e = enemies[j];
                const dx3 = b.x - e.x;
                const dy3 = b.y - e.y;
                const hitDist = e.type === 'caine' ? 1.2 : 0.8;
                if (dx3 * dx3 + dy3 * dy3 < hitDist) {
                    e.hp--;
                    if (e.hp <= 0) {
                        const points = e.type === 'caine' ? 50 : 10;
                        score += points;
                        enemies.splice(j, 1);
                    }
                    bulletUsed = true;
                    updateUI();
                    break;
                }
            }

            if (bulletUsed || b.life <= 0 || b.x < -1 || b.x > COLS + 1 || b.y < -1 || b.y > ROWS + 1) {
                bullets.splice(i, 1);
            }
        }

        // --- Столкновение с игроком ---
        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            const dx4 = player.x - e.x;
            const dy4 = player.y - e.y;
            const hitDist = e.type === 'caine' ? 1.5 : 1.0;
            if (dx4 * dx4 + dy4 * dy4 < hitDist) {
                hp--;
                enemies.splice(i, 1);
                updateUI();
                if (hp <= 0) {
                    gameOver = true;
                    hp = 0;
                    updateUI();
                }
                break;
            }
        }

        enemyCountSpan.textContent = enemies.length;
    }

    // ============================================================
    //  РИСОВКА (узнаваемые персонажи)
    // ============================================================
    function draw() {
        ctx.clearRect(0, 0, SIZE, SIZE);

        // --- ФОН: цифровой цирк ---
        // Полосы как в сериале
        const grad = ctx.createRadialGradient(SIZE/2, SIZE/2, 50, SIZE/2, SIZE/2, 400);
        grad.addColorStop(0, '#2a1a6a');
        grad.addColorStop(0.5, '#1a1050');
        grad.addColorStop(1, '#0a0820');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, SIZE, SIZE);

        // Цирковые полосы
        for (let i = 0; i < 20; i++) {
            const y = i * 24 + (frame * 0.2) % 24;
            ctx.fillStyle = i % 2 === 0 ? 'rgba(100, 80, 200, 0.05)' : 'rgba(200, 100, 255, 0.03)';
            ctx.fillRect(0, y, SIZE, 24);
        }

        // Сетка (цифровой эффект)
        ctx.strokeStyle = 'rgba(100, 80, 200, 0.06)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= COLS; i++) {
            ctx.beginPath();
            ctx.moveTo(i * CELL, 0);
            ctx.lineTo(i * CELL, SIZE);
            ctx.stroke();
        }
        for (let i = 0; i <= ROWS; i++) {
            ctx.beginPath();
            ctx.moveTo(0, i * CELL);
            ctx.lineTo(SIZE, i * CELL);
            ctx.stroke();
        }

        // --- РИСУЕМ ВРАГОВ (Джекс и Кейн) ---
        for (let e of enemies) {
            const x = e.x * CELL;
            const y = e.y * CELL;
            const s = e.type === 'caine' ? 1.6 : 1.2;

            if (e.type === 'caine') {
                // КЕЙН — красный циркач с улыбкой
                ctx.fillStyle = '#cc3333';
                ctx.fillRect(x - 4, y - 4, 24*s, 24*s);

                // Глаза
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(x + 4, y + 4, 8*s, 8*s);
                ctx.fillRect(x + 14*s, y + 4, 8*s, 8*s);
                ctx.fillStyle = '#000';
                ctx.fillRect(x + 8*s, y + 6*s, 4*s, 4*s);
                ctx.fillRect(x + 18*s, y + 6*s, 4*s, 4*s);

                // Шляпа
                ctx.fillStyle = '#8b0000';
                ctx.fillRect(x - 2, y - 12*s, 28*s, 8*s);
                ctx.fillRect(x + 6*s, y - 20*s, 12*s, 10*s);

                // Улыбка
                ctx.fillStyle = '#ff9999';
                ctx.fillRect(x + 6*s, y + 14*s, 12*s, 4*s);
                ctx.fillRect(x + 4*s, y + 16*s, 16*s, 4*s);

                // Бантик
                ctx.fillStyle = '#ff6b6b';
                ctx.fillRect(x - 8*s, y - 2*s, 6*s, 6*s);
                ctx.fillRect(x + 26*s, y - 2*s, 6*s, 6*s);

            } else {
                // ДЖЕКС — фиолетовый с глазами
                ctx.fillStyle = e.color;
                ctx.fillRect(x, y, 20*s, 20*s);

                // Глаза (большие, как в мультике)
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(x + 2*s, y + 2*s, 8*s, 10*s);
                ctx.fillRect(x + 10*s, y + 2*s, 8*s, 10*s);

                ctx.fillStyle = '#2a1a4a';
                ctx.fillRect(x + 4*s, y + 4*s, 4*s, 6*s);
                ctx.fillRect(x + 12*s, y + 4*s, 4*s, 6*s);

                // Зрачки (бегают)
                const eyeOff = Math.sin(e.animFrame) * 2;
                ctx.fillStyle = '#000';
                ctx.fillRect(x + 6*s + eyeOff, y + 6*s, 3*s, 4*s);
                ctx.fillRect(x + 14*s + eyeOff, y + 6*s, 3*s, 4*s);

                // Улыбка (кривая)
                ctx.fillStyle = '#6a3a8a';
                ctx.fillRect(x + 4*s, y + 14*s, 12*s, 3*s);
                ctx.fillRect(x + 2*s, y + 15*s, 16*s, 3*s);

                // Рожки
                ctx.fillStyle = '#6a3a8a';
                ctx.fillRect(x - 2*s, y - 4*s, 6*s, 6*s);
                ctx.fillRect(x + 16*s, y - 4*s, 6*s, 6*s);
            }
        }

        // --- РИСУЕМ ИГРОКА (ПОМНИ) ---
        const px = player.x * CELL;
        const py = player.y * CELL;
        const ps = 1.3;

        // Тело (жёлтое)
        ctx.fillStyle = '#ffd93d';
        ctx.fillRect(px - 2, py - 2, 22*ps, 22*ps);

        // Волосы (синие)
        ctx.fillStyle = '#4a7aff';
        ctx.fillRect(px - 2, py - 6*ps, 24*ps, 6*ps);
        ctx.fillRect(px + 2*ps, py - 10*ps, 16*ps, 6*ps);

        // Глаза
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(px + 2*ps, py + 2*ps, 8*ps, 8*ps);
        ctx.fillRect(px + 12*ps, py + 2*ps, 8*ps, 8*ps);

        ctx.fillStyle = '#2a1a4a';
        ctx.fillRect(px + 4*ps, py + 4*ps, 4*ps, 5*ps);
        ctx.fillRect(px + 14*ps, py + 4*ps, 4*ps, 5*ps);

        ctx.fillStyle = '#000';
        ctx.fillRect(px + 6*ps, py + 5*ps, 2*ps, 4*ps);
        ctx.fillRect(px + 16*ps, py + 5*ps, 2*ps, 4*ps);

        // Улыбка
        ctx.fillStyle = '#cc6644';
        ctx.fillRect(px + 4*ps, py + 14*ps, 14*ps, 3*ps);
        ctx.fillRect(px + 2*ps, py + 15*ps, 18*ps, 3*ps);

        // Щёки (розовые)
        ctx.fillStyle = 'rgba(255, 100, 150, 0.3)';
        ctx.fillRect(px - 2*ps, py + 8*ps, 6*ps, 6*ps);
        ctx.fillRect(px + 18*ps, py + 8*ps, 6*ps, 6*ps);

        // --- РИСУЕМ ПУЛИ ---
        for (let b of bullets) {
            const bx = b.x * CELL;
            const by = b.y * CELL;
            ctx.fillStyle = '#ffd93d';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ffd93d';
            ctx.fillRect(bx - 4, by - 4, 8, 8);
            ctx.fillRect(bx - 2, by - 8, 4, 16);
            ctx.fillRect(bx - 8, by - 2, 16, 4);
            ctx.shadowBlur = 0;
        }

        // --- GAME OVER ---
        if (gameOver) {
            ctx.fillStyle = 'rgba(10, 8, 30, 0.85)';
            ctx.fillRect(0, 0, SIZE, SIZE);

            // Цирковая рамка
            ctx.strokeStyle = '#6a5acd';
            ctx.lineWidth = 4;
            ctx.strokeRect(40, 120, SIZE - 80, 160);

            ctx.font = 'bold 32px "Courier New", monospace';
            ctx.fillStyle = '#ff6b9d';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🎪 ИГРА ОКОНЧЕНА', SIZE / 2, 190);

            ctx.font = '18px "Courier New", monospace';
            ctx.fillStyle = '#c8b8ff';
            ctx.fillText('нажми ↺ чтобы начать снова', SIZE / 2, 240);

            ctx.font = '14px "Courier New", monospace';
            ctx.fillStyle = '#8a7ab5';
            ctx.fillText(`счёт: ${score}`, SIZE / 2, 280);
        }

        // --- Подпись ---
        ctx.font = '10px "Courier New", monospace';
        ctx.fillStyle = 'rgba(100, 80, 200, 0.3)';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'bottom';
        ctx.fillText('ПОМНИ · ДЖЕКС · КЕЙН', 8, SIZE - 6);
    }

    // ============================================================
    //  ЦИКЛ
    // ============================================================
    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // ============================================================
    //  УПРАВЛЕНИЕ
    // ============================================================
    function handleCanvasClick(e) {
        if (gameOver) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
            e.preventDefault();
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }

        const canvasX = (clientX - rect.left) * scaleX;
        const canvasY = (clientY - rect.top) * scaleY;

        const gridX = canvasX / CELL;
        const gridY = canvasY / CELL;

        targetX = Math.max(0.3, Math.min(COLS - 0.7, gridX));
        targetY = Math.max(0.3, Math.min(ROWS - 0.7, gridY));

        shootAt(gridX, gridY);
    }

    canvas.addEventListener('click', handleCanvasClick);
    canvas.addEventListener('touchstart', handleCanvasClick, { passive: false });

    // ============================================================
    //  РЕСТАРТ
    // ============================================================
    document.getElementById('restartBtn').addEventListener('click', () => {
        resetGame();
        player.x = 10;
        player.y = 18;
        targetX = player.x;
        targetY = player.y;
        enemies = [];
        bullets = [];
        spawnCounter = 0;
        updateUI();
    });

    // ============================================================
    //  ЗАПУСК
    // ============================================================
    resetGame();
    gameLoop();

    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }
</script>

</body>
</html>
